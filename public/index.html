<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Mychat</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-darker: #0f0f1a;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text-dim: #888;
            --border: #2a2a3e;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-screen.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .app-container {
            display: none;
            height: 100vh;
        }

        .app-container.visible {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: rgba(15, 15, 26, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .username {
            font-weight: 600;
        }

        .status {
            font-size: 12px;
            color: var(--success);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        .friends-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .add-friend-btn {
            background: linear-gradient(135deg, var(--primary), var(--bg-dark));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            color: var(--text);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            margin-bottom: 10px;
        }

        .search-results {
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-result-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .add-friend-small {
            background: var(--accent);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .friend-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .friend-item.active {
            background: rgba(233, 69, 96, 0.2);
        }

        .friend-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .friend-info {
            flex: 1;
            cursor: pointer;
        }

        .friend-name {
            font-size: 14px;
            font-weight: 500;
        }

        .friend-status {
            font-size: 11px;
            color: var(--text-dim);
        }

        .friend-status.online {
            color: var(--success);
        }

        .call-btn {
            background: #10b981;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .call-btn:hover {
            transform: scale(1.05);
            background: #059669;
        }

        .request-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--warning);
        }

        .request-info {
            flex: 1;
        }

        .request-username {
            font-size: 14px;
            font-weight: 500;
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .accept-btn, .decline-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .accept-btn {
            background: var(--success);
            color: white;
        }

        .decline-btn {
            background: #ef4444;
            color: white;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .chat-with {
            font-size: 18px;
            font-weight: 600;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, var(--accent), #c73e56);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            padding: 0 8px;
        }

        .message-input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text);
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #c73e56);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            text-align: center;
            padding: 40px;
        }

        .call-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        .call-container.active {
            display: flex;
        }

        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remote-avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            color: white;
        }

        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            border-radius: 10px;
            border: 2px solid white;
            cursor: pointer;
        }

        .local-avatar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            border: 2px solid white;
        }

        .call-status-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10002;
            display: flex;
            gap: 15px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge.muted {
            color: #ef4444;
        }

        .status-badge.camera-off {
            color: #f59e0b;
        }

        .status-icon {
            font-size: 16px;
        }

        .call-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10001;
        }

        .call-controls button {
            background: #333;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            margin: 0 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .call-controls button:hover {
            transform: scale(1.05);
        }

        .end-call {
            background: red !important;
        }

        .incoming-call {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #1a1a2e;
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 15px 20px;
            z-index: 10001;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .incoming-call.show {
            display: block;
        }

        .calling-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 10002;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 20px;
        }

        .calling-status h2 {
            margin-bottom: 10px;
        }

        .calling-status p {
            color: #aaa;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .user-details, .friend-info .friend-status, .friend-name {
                display: none;
            }
            .local-video, .local-avatar {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
            .remote-avatar {
                width: 120px;
                height: 120px;
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <div>Loading Mychat...</div>
    </div>

    <div id="appContainer" class="app-container">
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-details">
                    <div class="username" id="currentUsername">User</div>
                    <div class="status" id="onlineStatus">Online</div>
                </div>
                <button class="logout-btn" onclick="logout()">Log out</button>
            </div>
            <div class="friends-section">
                <button class="add-friend-btn" onclick="toggleSearch()">+ Add Friend</button>
                <div id="searchSection" style="display: none;">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search users..." oninput="searchUsers()">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="section-title">FRIEND REQUESTS</div>
                <div id="requestsList" class="friends-list"></div>
                <div class="section-title">FRIENDS</div>
                <div class="friends-list" id="friendsList"></div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-with" id="chatWith">Select a friend to start chatting</div>
                <div id="typingStatus" style="font-size: 12px; color: #e94560; margin-top: 5px;"></div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-chat">Click on a friend to start messaging</div>
            </div>
            <div class="message-input-area">
                <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1" onkeypress="handleKeyPress(event)" oninput="handleTyping()"></textarea>
                <button class="send-btn" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <div id="callContainer" class="call-container">
        <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
        <div id="remoteAvatar" class="remote-avatar"></div>
        <video id="localVideo" class="local-video" autoplay playsinline muted></video>
        <div id="localAvatar" class="local-avatar"></div>
        
        <div id="callStatusBadges" class="call-status-badge">
            <div id="muteBadge" class="status-badge" style="display: none;">
                <span class="status-icon">MIC</span>
                <span>Muted</span>
            </div>
            <div id="cameraBadge" class="status-badge" style="display: none;">
                <span class="status-icon">CAM</span>
                <span>Camera Off</span>
            </div>
        </div>
        
        <div id="callingStatus" class="calling-status" style="display: none;">
            <h2>Calling...</h2>
            <p>Waiting for answer</p>
        </div>
        
        <div class="call-controls">
            <button id="toggleMuteBtn" onclick="toggleMute()">Mute</button>
            <button id="toggleVideoBtn" onclick="toggleVideo()">Camera Off</button>
            <button id="endCallBtn" class="end-call" onclick="endCall()">End</button>
        </div>
    </div>

    <div id="incomingCall" class="incoming-call">
        <div id="callerName"></div>
        <div style="margin-top: 10px;">
            <button onclick="acceptCall()" style="background: #10b981; color: white; padding: 8px 16px; border: none; border-radius: 8px; margin-right: 10px;">Accept</button>
            <button onclick="rejectCall()" style="background: #ef4444; color: white; padding: 8px 16px; border: none; border-radius: 8px;">Reject</button>
        </div>
    </div>

    <audio id="messageSound" src="/text.wav" preload="auto"></audio>
    <audio id="callSound" src="/call.mp3" preload="auto" loop></audio>

    <script>
        const API_URL = '';
        let socket = null;
        let currentUser = null;
        let currentChatFriend = null;
        let accessToken = null;
        let refreshToken = null;
        let typingTimeout = null;
        let pendingRequestsList = [];
        let userPeerIds = {};
        
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let isMuted = false;
        let isVideoOff = false;
        let incomingCallData = null;
        let callRingtone = null;
        let callRingtoneTimeout = null;

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setCookie(name, value, days) {
            let expires = '';
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = '; expires=' + date.toUTCString();
            }
            document.cookie = name + '=' + (value || '') + expires + '; path=/';
        }

        function deleteCookie(name) {
            document.cookie = name + '=; Max-Age=-99999999; path=/';
        }

        function updateCallBadges() {
            const muteBadge = document.getElementById('muteBadge');
            const cameraBadge = document.getElementById('cameraBadge');
            if (isMuted) {
                muteBadge.style.display = 'flex';
            } else {
                muteBadge.style.display = 'none';
            }
            if (isVideoOff) {
                cameraBadge.style.display = 'flex';
            } else {
                cameraBadge.style.display = 'none';
            }
        }

        function playMessageSound() {
            const audio = document.getElementById('messageSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => {});
                setTimeout(() => {
                    if (audio) audio.pause();
                }, 2000);
            }
        }

        function startCallRingtone() {
            const audio = document.getElementById('callSound');
            if (audio) {
                callRingtone = audio;
                audio.currentTime = 0;
                audio.loop = true;
                audio.play().catch(e => {});
                callRingtoneTimeout = setTimeout(() => {
                    if (callRingtone) {
                        callRingtone.pause();
                        callRingtone.currentTime = 0;
                    }
                    if (incomingCallData) {
                        rejectCall();
                    }
                }, 30000);
            }
        }

        function stopCallRingtone() {
            if (callRingtone) {
                callRingtone.pause();
                callRingtone.currentTime = 0;
                callRingtone = null;
            }
            if (callRingtoneTimeout) {
                clearTimeout(callRingtoneTimeout);
                callRingtoneTimeout = null;
            }
        }

        function initPeer() {
            const peerId = currentUser.id;
            peer = new Peer(peerId, {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:stun3.l.google.com:19302' },
                        { urls: 'stun:stun4.l.google.com:19302' }
                    ]
                }
            });
            
            peer.on('open', (id) => {
                userPeerIds[currentUser.id] = id;
                if (socket && socket.connected) {
                    socket.emit('peer-ready', { peerId: id });
                }
            });
            
            peer.on('call', (call) => {
                incomingCallData = call;
                const callerName = call.metadata?.fromName || 'Someone';
                document.getElementById('callerName').innerHTML = callerName + ' is calling you!';
                document.getElementById('incomingCall').classList.add('show');
                startCallRingtone();
            });
            
            peer.on('error', (err) => {
                showToast('Call error: ' + err.message, 'error');
            });
        }

        function updateCallUI() {
            const remoteVideo = document.getElementById('remoteVideo');
            const remoteAvatar = document.getElementById('remoteAvatar');
            const localVideo = document.getElementById('localVideo');
            const localAvatar = document.getElementById('localAvatar');
            
            if (isVideoOff || !localStream) {
                localVideo.style.display = 'none';
                localAvatar.style.display = 'flex';
                if (currentUser) {
                    localAvatar.innerHTML = currentUser.username.charAt(0).toUpperCase();
                }
            } else {
                localVideo.style.display = 'block';
                localAvatar.style.display = 'none';
            }
            
            if (currentCall && currentCall._remoteStream) {
                remoteVideo.style.display = 'block';
                remoteAvatar.style.display = 'none';
            } else if (currentCall) {
                remoteVideo.style.display = 'none';
                remoteAvatar.style.display = 'flex';
                if (currentChatFriend) {
                    remoteAvatar.innerHTML = currentChatFriend.username.charAt(0).toUpperCase();
                }
            }
            
            updateCallBadges();
        }

        async function startVideoCall(friendId, friendName) {
            if (!peer || !peer.id) {
                showToast('Call system initializing...', 'error');
                return;
            }
            
            const friendPeerId = userPeerIds[friendId];
            if (!friendPeerId) {
                showToast(friendName + ' is offline or not available for calls', 'error');
                return;
            }
            
            document.getElementById('callingStatus').style.display = 'block';
            document.getElementById('callContainer').classList.add('active');
            
            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack && isVideoOff) {
                    videoTrack.enabled = false;
                }
                
                document.getElementById('localVideo').srcObject = localStream;
                updateCallUI();
                
                const call = peer.call(friendPeerId, localStream, {
                    metadata: { fromName: currentUser.username }
                });
                
                call.on('stream', (remoteStream) => {
                    currentCall._remoteStream = remoteStream;
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    document.getElementById('callingStatus').style.display = 'none';
                    updateCallUI();
                });
                
                call.on('close', () => {
                    endCall();
                });
                
                call.on('error', (err) => {
                    endCall();
                });
                
                currentCall = call;
            } catch (err) {
                showToast('Cannot access camera or microphone', 'error');
                document.getElementById('callingStatus').style.display = 'none';
                endCall();
            }
        }

        async function acceptCall() {
            const call = incomingCallData;
            if (!call) return;
            
            stopCallRingtone();
            
            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack && isVideoOff) {
                    videoTrack.enabled = false;
                }
                
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callContainer').classList.add('active');
                updateCallUI();
                
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    currentCall._remoteStream = remoteStream;
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                    updateCallUI();
                });
                call.on('close', () => {
                    endCall();
                });
                call.on('error', (err) => {
                    endCall();
                });
                
                currentCall = call;
                document.getElementById('incomingCall').classList.remove('show');
                incomingCallData = null;
            } catch (err) {
                showToast('Cannot access camera or microphone', 'error');
                endCall();
            }
        }

        function rejectCall() {
            stopCallRingtone();
            if (incomingCallData) {
                incomingCallData.close();
                incomingCallData = null;
            }
            document.getElementById('incomingCall').classList.remove('show');
        }

        function endCall() {
            stopCallRingtone();
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            document.getElementById('callContainer').classList.remove('active');
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').style.display = 'none';
            document.getElementById('remoteAvatar').style.display = 'flex';
            document.getElementById('callingStatus').style.display = 'none';
            isMuted = false;
            isVideoOff = false;
            document.getElementById('toggleMuteBtn').innerHTML = 'Mute';
            document.getElementById('toggleVideoBtn').innerHTML = 'Camera Off';
            updateCallBadges();
        }

        function toggleMute() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    isMuted = !audioTrack.enabled;
                    document.getElementById('toggleMuteBtn').innerHTML = isMuted ? 'Unmute' : 'Mute';
                    updateCallBadges();
                }
            }
        }

        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    isVideoOff = !videoTrack.enabled;
                    document.getElementById('toggleVideoBtn').innerHTML = isVideoOff ? 'Camera On' : 'Camera Off';
                    updateCallUI();
                }
            }
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b'};
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                font-size: 14px;
                z-index: 3000;
                animation: slideUp 0.3s ease;
            `;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function containsEmoji(text) {
            const emojiRegex = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}]/u;
            return emojiRegex.test(text);
        }

        async function fetchWithAuth(url, options = {}) {
            if (!accessToken) throw new Error('No access token');
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type': 'application/json'
            };
            let response = await fetch(url, options);
            if (response.status === 403) {
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    options.headers['Authorization'] = `Bearer ${accessToken}`;
                    response = await fetch(url, options);
                } else {
                    logout();
                    throw new Error('Session expired');
                }
            }
            return response;
        }

        async function refreshAccessToken() {
            try {
                const response = await fetch(`${API_URL}/api/refresh-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });
                if (response.ok) {
                    const data = await response.json();
                    accessToken = data.accessToken;
                    setCookie('accessToken', accessToken, 7);
                    return true;
                }
            } catch (error) {
            }
            return false;
        }

        async function logout() {
            if (accessToken) {
                await fetch(`${API_URL}/api/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                }).catch(() => {});
            }
            if (socket) socket.disconnect();
            if (peer) peer.destroy();
            stopCallRingtone();
            deleteCookie('accessToken');
            deleteCookie('refreshToken');
            deleteCookie('currentUser');
            deleteCookie('username');
            window.location.href = '/login.html';
        }

        function initSocket() {
            socket = io();
            socket.on('connect', () => {
                socket.emit('user-online', accessToken);
                if (peer && peer.id) {
                    socket.emit('peer-ready', { peerId: peer.id });
                }
            });
            socket.on('new-message', (message) => {
                if (message.senderId !== currentUser.id) {
                    playMessageSound();
                }
                if (currentChatFriend && (message.senderId === currentChatFriend.id || message.receiverId === currentChatFriend.id)) {
                    loadMessages();
                }
            });
            socket.on('message-sent', (message) => {
                loadMessages();
            });
            socket.on('user-typing', (data) => {
                if (currentChatFriend && data.userId === currentChatFriend.id) {
                    const typingStatus = document.getElementById('typingStatus');
                    typingStatus.textContent = data.isTyping ? currentChatFriend.username + ' is typing...' : '';
                }
            });
            socket.on('friend-request', (data) => {
                showToast(data.fromUsername + ' sent you a friend request!', 'info');
                loadPendingRequests();
            });
            socket.on('friend-request-accepted', (data) => {
                showToast(data.fromUsername + ' accepted your friend request!', 'success');
                loadFriends();
                loadPendingRequests();
            });
            socket.on('friend-status-change', (data) => {
                loadFriends();
                if (currentChatFriend && currentChatFriend.id === data.friendId) {
                    const statusEl = document.querySelector('.friend-status');
                    if (statusEl) {
                        statusEl.textContent = data.online ? 'Online' : 'Offline';
                        statusEl.className = 'friend-status ' + (data.online ? 'online' : '');
                    }
                }
            });
            socket.on('peer-ready', (data) => {
                if (data.userId !== currentUser.id) {
                    userPeerIds[data.userId] = data.peerId;
                }
            });
        }

        function handleTyping() {
            if (!socket || !currentChatFriend) return;
            socket.emit('typing', { receiverId: currentChatFriend.id, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { receiverId: currentChatFriend.id, isTyping: false });
            }, 1000);
        }

        let searchTimeout = null;
        async function searchUsers() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            if (!query) { resultsDiv.innerHTML = ''; return; }
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetchWithAuth(`${API_URL}/api/users/search?q=${encodeURIComponent(query)}`);
                    const users = await response.json();
                    resultsDiv.innerHTML = users.map(user => `
                        <div class="search-result-item">
                            <span>${escapeHtml(user.username)}</span>
                            <button class="add-friend-small" onclick="sendFriendRequest('${user.id}', '${escapeHtml(user.username)}')">Add</button>
                        </div>
                    `).join('');
                } catch (error) { }
            }, 300);
        }

        async function sendFriendRequest(friendId, friendName) {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/request`, {
                    method: 'POST',
                    body: JSON.stringify({ friendId })
                });
                if (response.ok) {
                    showToast('Friend request sent to ' + friendName + '!', 'success');
                    document.getElementById('searchInput').value = '';
                    document.getElementById('searchResults').innerHTML = '';
                    document.getElementById('searchSection').style.display = 'none';
                } else {
                    const data = await response.json();
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Failed to send request', 'error');
            }
        }

        async function loadPendingRequests() {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/requests`);
                const requests = await response.json();
                pendingRequestsList = requests;
                const requestsList = document.getElementById('requestsList');
                if (requests.length === 0) {
                    requestsList.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">No pending requests</div>';
                    return;
                }
                requestsList.innerHTML = requests.map(req => `
                    <div class="request-item">
                        <div class="request-info">
                            <div class="request-username">${escapeHtml(req.fromUsername)}</div>
                        </div>
                        <div class="request-actions">
                            <button class="accept-btn" onclick="acceptRequest('${req.fromId}')">Accept</button>
                            <button class="decline-btn" onclick="declineRequest('${req.fromId}')">Decline</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) { }
        }

        async function acceptRequest(friendId) {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/accept`, {
                    method: 'POST',
                    body: JSON.stringify({ friendId })
                });
                if (response.ok) {
                    showToast('Friend request accepted!', 'success');
                    await loadFriends();
                    await loadPendingRequests();
                    if (socket) {
                        socket.emit('friend-request-accepted', { friendId });
                    }
                }
            } catch (error) {
                showToast('Failed to accept request', 'error');
            }
        }

        async function declineRequest(friendId) {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/decline`, {
                    method: 'POST',
                    body: JSON.stringify({ friendId })
                });
                if (response.ok) {
                    showToast('Friend request declined', 'info');
                    await loadPendingRequests();
                }
            } catch (error) {
                showToast('Failed to decline request', 'error');
            }
        }

        async function loadFriends() {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/list`);
                const friends = await response.json();
                const friendsList = document.getElementById('friendsList');
                if (friends.length === 0) {
                    friendsList.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">No friends yet<br>Add friends to start chatting</div>';
                    return;
                }
                friendsList.innerHTML = friends.map(friend => `
                    <div class="friend-item">
                        <div class="friend-avatar">${friend.username.charAt(0).toUpperCase()}</div>
                        <div class="friend-info" onclick="selectFriend('${friend.id}', '${escapeHtml(friend.username)}')">
                            <div class="friend-name">${escapeHtml(friend.username)}</div>
                            <div class="friend-status ${friend.online ? 'online' : ''}">${friend.online ? 'Online' : 'Offline'}</div>
                        </div>
                        <button class="call-btn" onclick="event.stopPropagation(); startVideoCall('${friend.id}', '${escapeHtml(friend.username)}')">Video Call</button>
                    </div>
                `).join('');
            } catch (error) { }
        }

        function toggleSearch() {
            const searchSection = document.getElementById('searchSection');
            searchSection.style.display = searchSection.style.display === 'none' ? 'block' : 'none';
            if (searchSection.style.display === 'block') {
                document.getElementById('searchInput').focus();
            }
        }

        async function selectFriend(friendId, friendName) {
            currentChatFriend = { id: friendId, username: friendName };
            document.getElementById('chatWith').innerHTML = 'Chat with ' + friendName;
            document.getElementById('typingStatus').innerHTML = '';
            await loadMessages();
            document.getElementById('messageInput').focus();
        }

        async function loadMessages() {
            if (!currentChatFriend) return;
            try {
                const response = await fetchWithAuth(`${API_URL}/api/messages/${currentChatFriend.id}`);
                const messages = await response.json();
                const container = document.getElementById('messagesContainer');
                if (messages.length === 0) {
                    container.innerHTML = '<div class="empty-chat">No messages yet<br>Send a message to start the conversation</div>';
                    return;
                }
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.senderId === currentUser.id ? 'sent' : 'received'}">
                        <div class="message-bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            } catch (error) { }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatFriend || !socket) {
                if (!currentChatFriend) showToast('Select a friend first', 'warning');
                return;
            }
            
            if (containsEmoji(text)) {
                showToast('Emojis are not allowed in messages', 'error');
                return;
            }
            
            socket.emit('send-message', { receiverId: currentChatFriend.id, text: text, tempId: Date.now().toString() });
            input.value = '';
            input.style.height = 'auto';
            clearTimeout(typingTimeout);
            if (typingTimeout) socket.emit('typing', { receiverId: currentChatFriend.id, isTyping: false });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('messageInput')?.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        async function showApp() {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('appContainer').classList.add('visible');
            document.getElementById('currentUsername').innerHTML = currentUser.username;
            document.getElementById('userAvatar').innerHTML = currentUser.username.charAt(0).toUpperCase();
            await loadFriends();
            await loadPendingRequests();
            initSocket();
            initPeer();
        }

        const savedToken = getCookie('accessToken');
        const savedUserCookie = getCookie('currentUser');
        
        if (savedToken && savedUserCookie) {
            accessToken = savedToken;
            refreshToken = getCookie('refreshToken');
            try {
                const userData = JSON.parse(savedUserCookie);
                currentUser = userData;
                showApp();
            } catch (e) {
                window.location.href = '/login.html';
            }
        } else {
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
