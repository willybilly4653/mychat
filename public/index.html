<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mychat - With Video Calls</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-darker: #0f0f1a;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text-dim: #888;
            --border: #2a2a3e;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            transition: transform 0.3s ease;
        }

        .auth-container.hidden {
            transform: translateY(-100%);
            pointer-events: none;
        }

        .auth-box {
            background: rgba(22, 30, 46, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #c73e56);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
        }

        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .toggle-auth a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        .app-container {
            display: none;
            height: 100vh;
        }

        .app-container.visible {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: rgba(15, 15, 26, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .username {
            font-weight: 600;
        }

        .status {
            font-size: 12px;
            color: var(--success);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        .friends-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .add-friend-btn {
            background: linear-gradient(135deg, var(--primary), var(--bg-dark));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            color: var(--text);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            margin-bottom: 10px;
        }

        .search-results {
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-result-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .add-friend-small {
            background: var(--accent);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .friend-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .friend-item.active {
            background: rgba(233, 69, 96, 0.2);
        }

        .friend-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .friend-info {
            flex: 1;
            cursor: pointer;
        }

        .friend-name {
            font-size: 14px;
            font-weight: 500;
        }

        .friend-status {
            font-size: 11px;
            color: var(--text-dim);
        }

        .friend-status.online {
            color: var(--success);
        }

        .call-btn {
            background: #10b981;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .call-btn:hover {
            transform: scale(1.05);
            background: #059669;
        }

        .request-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--warning);
        }

        .request-info {
            flex: 1;
        }

        .request-username {
            font-size: 14px;
            font-weight: 500;
        }

        .request-actions {
            display: flex;
            gap: 8px;
        }

        .accept-btn, .decline-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .accept-btn {
            background: var(--success);
            color: white;
        }

        .decline-btn {
            background: #ef4444;
            color: white;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .chat-with {
            font-size: 18px;
            font-weight: 600;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, var(--accent), #c73e56);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            padding: 0 8px;
        }

        .message-input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text);
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #c73e56);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            text-align: center;
            padding: 40px;
        }

        /* Video Call Modal */
        .call-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        .call-container.active {
            display: flex;
        }

        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            border-radius: 10px;
            border: 2px solid white;
            cursor: pointer;
        }

        .call-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10001;
        }

        .call-controls button {
            background: #333;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            margin: 0 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .call-controls button:hover {
            transform: scale(1.05);
        }

        .end-call {
            background: red !important;
        }

        .incoming-call {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #1a1a2e;
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 15px 20px;
            z-index: 10001;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .incoming-call.show {
            display: block;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .user-details, .friend-info .friend-status, .friend-name {
                display: none;
            }
            .local-video {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">Create Account</h2>
            <div id="loginForm" style="display: none;">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Username (max 20 chars)" maxlength="20">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <div class="error-msg" id="loginError"></div>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                <div class="toggle-auth">Don't have an account? <a onclick="showRegister()">Sign up</a></div>
            </div>
            <div id="registerForm">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Username (max 20 chars, no profanity)" maxlength="20">
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Password (min 8 characters)">
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" placeholder="Confirm Password">
                </div>
                <div class="error-msg" id="regError"></div>
                <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
                <div class="toggle-auth">Already have an account? <a onclick="showLogin()">Login</a></div>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container">
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-details">
                    <div class="username" id="currentUsername">User</div>
                    <div class="status" id="onlineStatus">● Online</div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
            <div class="friends-section">
                <button class="add-friend-btn" onclick="toggleSearch()">+ Add Friend</button>
                <div id="searchSection" style="display: none;">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search users..." oninput="searchUsers()">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="section-title">FRIEND REQUESTS</div>
                <div id="requestsList" class="friends-list"></div>
                <div class="section-title">FRIENDS</div>
                <div class="friends-list" id="friendsList"></div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-with" id="chatWith">Select a friend to start chatting</div>
                <div id="typingStatus" style="font-size: 12px; color: #e94560; margin-top: 5px;"></div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-chat">Click on a friend to start messaging</div>
            </div>
            <div class="message-input-area">
                <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1" onkeypress="handleKeyPress(event)" oninput="handleTyping()"></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Video Call UI -->
    <div id="callContainer" class="call-container">
        <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
        <video id="localVideo" class="local-video" autoplay playsinline muted></video>
        <div class="call-controls">
            <button id="toggleMuteBtn" onclick="toggleMute()">🔇 Mute</button>
            <button id="toggleVideoBtn" onclick="toggleVideo()">📹 Video Off</button>
            <button id="endCallBtn" class="end-call" onclick="endCall()">🔴 End Call</button>
        </div>
    </div>

    <div id="incomingCall" class="incoming-call">
        <div id="callerName"></div>
        <div style="margin-top: 10px;">
            <button onclick="acceptCall()" style="background: #10b981; color: white; padding: 8px 16px; border: none; border-radius: 8px; margin-right: 10px;">Accept</button>
            <button onclick="rejectCall()" style="background: #ef4444; color: white; padding: 8px 16px; border: none; border-radius: 8px;">Reject</button>
        </div>
    </div>

    <script>
        const API_URL = '';
        let socket = null;
        let currentUser = null;
        let currentChatFriend = null;
        let accessToken = null;
        let refreshToken = null;
        let typingTimeout = null;
        let pendingRequestsList = [];
        
        // Video call variables
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let isMuted = false;
        let isVideoOff = false;
        let incomingCallData = null;

        // Initialize PeerJS for video calls
        function initPeer() {
            peer = new Peer(currentUser.id, {
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });
            
            peer.on('open', (id) => {
                console.log('Peer ready! ID:', id);
                socket.emit('peer-ready', { peerId: id });
            });
            
            peer.on('call', (call) => {
                incomingCallData = call;
                document.getElementById('callerName').textContent = `${call.metadata?.fromName} is calling you!`;
                document.getElementById('incomingCall').classList.add('show');
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
                showToast('Call error: ' + err.message, 'error');
            });
        }

        async function startVideoCall(friendId, friendName) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callContainer').classList.add('active');
                
                const call = peer.call(friendId, localStream, {
                    metadata: { fromName: currentUser.username }
                });
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                });
                
                call.on('close', () => {
                    endCall();
                });
                
                currentCall = call;
                showToast(`Calling ${friendName}...`, 'info');
            } catch (err) {
                console.error('Camera error:', err);
                showToast('Cannot access camera/microphone', 'error');
            }
        }

        async function acceptCall() {
            const call = incomingCallData;
            if (!call) return;
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('callContainer').classList.add('active');
                
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                });
                call.on('close', () => {
                    endCall();
                });
                
                currentCall = call;
                document.getElementById('incomingCall').classList.remove('show');
                incomingCallData = null;
            } catch (err) {
                console.error('Camera error:', err);
                showToast('Cannot access camera/microphone', 'error');
            }
        }

        function rejectCall() {
            if (incomingCallData) {
                incomingCallData.close();
                incomingCallData = null;
            }
            document.getElementById('incomingCall').classList.remove('show');
            showToast('Call rejected', 'info');
        }

        function endCall() {
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            document.getElementById('callContainer').classList.remove('active');
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('localVideo').srcObject = null;
            isMuted = false;
            isVideoOff = false;
            document.getElementById('toggleMuteBtn').textContent = '🔇 Mute';
            document.getElementById('toggleVideoBtn').textContent = '📹 Video Off';
        }

        function toggleMute() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    isMuted = !audioTrack.enabled;
                    document.getElementById('toggleMuteBtn').textContent = isMuted ? '🔊 Unmute' : '🔇 Mute';
                }
            }
        }

        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    isVideoOff = !videoTrack.enabled;
                    document.getElementById('toggleVideoBtn').textContent = isVideoOff ? '📹 Video On' : '📹 Video Off';
                }
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b'};
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                font-size: 14px;
                z-index: 3000;
                animation: slideUp 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function containsProfanity(text) {
            const badWords = ['fuck', 'shit', 'ass', 'bitch', 'damn', 'crap', 'hell', 'dick', 'pussy', 'cock', 'whore', 'slut', 'cunt', 'nigger', 'fag', 'retard'];
            const lowerText = text.toLowerCase();
            return badWords.some(word => lowerText.includes(word));
        }

        function containsEmoji(text) {
            const emojiRegex = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}]/u;
            return emojiRegex.test(text);
        }

        async function fetchWithAuth(url, options = {}) {
            if (!accessToken) throw new Error('No access token');
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type': 'application/json'
            };
            let response = await fetch(url, options);
            if (response.status === 403) {
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    options.headers['Authorization'] = `Bearer ${accessToken}`;
                    response = await fetch(url, options);
                } else {
                    logout();
                    throw new Error('Session expired');
                }
            }
            return response;
        }

        async function refreshAccessToken() {
            try {
                const response = await fetch(`${API_URL}/api/refresh-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });
                if (response.ok) {
                    const data = await response.json();
                    accessToken = data.accessToken;
                    localStorage.setItem('accessToken', accessToken);
                    return true;
                }
            } catch (error) {
                console.error('Token refresh failed:', error);
            }
            return false;
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const errorEl = document.getElementById('regError');

            if (!username || !password) {
                errorEl.textContent = 'Please fill all fields';
                errorEl.classList.add('show');
                return;
            }

            if (username.length > 20) {
                errorEl.textContent = 'Username must be 20 characters or less';
                errorEl.classList.add('show');
                return;
            }

            if (username.length < 3) {
                errorEl.textContent = 'Username must be at least 3 characters';
                errorEl.classList.add('show');
                return;
            }

            if (containsProfanity(username)) {
                errorEl.textContent = 'Username contains inappropriate language';
                errorEl.classList.add('show');
                return;
            }

            if (containsEmoji(username)) {
                errorEl.textContent = 'Username cannot contain emojis';
                errorEl.classList.add('show');
                return;
            }

            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.classList.add('show');
                return;
            }

            if (password.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters';
                errorEl.classList.add('show');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    accessToken = data.accessToken;
                    refreshToken = data.refreshToken;
                    localStorage.setItem('accessToken', accessToken);
                    localStorage.setItem('refreshToken', refreshToken);
                    currentUser = data.user;
                    showToast('Account created successfully!', 'success');
                    showApp();
                } else {
                    errorEl.textContent = data.error;
                    errorEl.classList.add('show');
                }
            } catch (error) {
                errorEl.textContent = 'Server error. Please try again.';
                errorEl.classList.add('show');
            }
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            if (!username || !password) {
                errorEl.textContent = 'Please enter username and password';
                errorEl.classList.add('show');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    accessToken = data.accessToken;
                    refreshToken = data.refreshToken;
                    localStorage.setItem('accessToken', accessToken);
                    localStorage.setItem('refreshToken', refreshToken);
                    currentUser = data.user;
                    showToast('Logged in successfully!', 'success');
                    showApp();
                } else {
                    errorEl.textContent = data.error;
                    errorEl.classList.add('show');
                }
            } catch (error) {
                errorEl.textContent = 'Server error. Please try again.';
                errorEl.classList.add('show');
            }
        }

        function showRegister() {
            document.getElementById('authTitle').textContent = 'Create Account';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('regError').classList.remove('show');
        }

        function showLogin() {
            document.getElementById('authTitle').textContent = 'Welcome Back';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loginError').classList.remove('show');
        }

        async function logout() {
            if (accessToken) {
                await fetch(`${API_URL}/api/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                }).catch(() => {});
            }
            if (socket) socket.disconnect();
            if (peer) peer.destroy();
            currentUser = null;
            currentChatFriend = null;
            accessToken = null;
            refreshToken = null;
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('appContainer').classList.remove('visible');
            showLogin();
            showToast('Logged out', 'info');
        }

        function initSocket() {
            socket = io();
            socket.on('connect', () => {
                console.log('Socket connected');
                socket.emit('user-online', accessToken);
            });
            socket.on('new-message', (message) => {
                if (currentChatFriend && (message.senderId === currentChatFriend.id || message.receiverId === currentChatFriend.id)) {
                    loadMessages();
                }
            });
            socket.on('message-sent', (message) => {
                loadMessages();
            });
            socket.on('user-typing', (data) => {
                if (currentChatFriend && data.userId === currentChatFriend.id) {
                    const typingStatus = document.getElementById('typingStatus');
                    typingStatus.textContent = data.isTyping ? `${currentChatFriend.username} is typing...` : '';
                }
            });
            socket.on('friend-request', (data) => {
                showToast(`${data.fromUsername} sent you a friend request!`, 'info');
                loadPendingRequests();
            });
            socket.on('friend-request-accepted', (data) => {
                showToast(`${data.fromUsername} accepted your friend request!`, 'success');
                loadFriends();
                loadPendingRequests();
            });
            socket.on('friend-status-change', (data) => {
                loadFriends();
                if (currentChatFriend && currentChatFriend.id === data.friendId) {
                    const statusEl = document.querySelector('.friend-status');
                    if (statusEl) {
                        statusEl.textContent = data.online ? 'Online' : 'Offline';
                        statusEl.className = `friend-status ${data.online ? 'online' : ''}`;
                    }
                }
            });
            socket.on('peer-id', (data) => {
                console.log('Friend peer ID:', data);
            });
        }

        function handleTyping() {
            if (!socket || !currentChatFriend) return;
            socket.emit('typing', { receiverId: currentChatFriend.id, isTyping: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { receiverId: currentChatFriend.id, isTyping: false });
            }, 1000);
        }

        let searchTimeout = null;
        async function searchUsers() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            if (!query) { resultsDiv.innerHTML = ''; return; }
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetchWithAuth(`${API_URL}/api/users/search?q=${encodeURIComponent(query)}`);
                    const users = await response.json();
                    resultsDiv.innerHTML = users.map(user => `
                        <div class="search-result-item">
                            <span>${escapeHtml(user.username)}</span>
                            <button class="add-friend-small" onclick="sendFriendRequest('${user.id}', '${escapeHtml(user.username)}')">Add</button>
                        </div>
                    `).join('');
                } catch (error) { console.error('Search failed:', error); }
            }, 300);
        }

        async function sendFriendRequest(friendId, friendName) {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/request`, {
                    method: 'POST',
                    body: JSON.stringify({ friendId })
                });
                if (response.ok) {
                    showToast(`Friend request sent to ${friendName}!`, 'success');
                    document.getElementById('searchInput').value = '';
                    document.getElementById('searchResults').innerHTML = '';
                    document.getElementById('searchSection').style.display = 'none';
                } else {
                    const data = await response.json();
                    showToast(data.error, 'error');
                }
            } catch (error) {
                showToast('Failed to send request', 'error');
            }
        }

        async function loadPendingRequests() {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/requests`);
                const requests = await response.json();
                pendingRequestsList = requests;
                const requestsList = document.getElementById('requestsList');
                if (requests.length === 0) {
                    requestsList.innerHTML = '<div style="text-align: center; color: #888; padding: 10px;">No pending requests</div>';
                    return;
                }
                requestsList.innerHTML = requests.map(req => `
                    <div class="request-item">
                        <div class="request-info">
                            <div class="request-username">${escapeHtml(req.fromUsername)}</div>
                        </div>
                        <div class="request-actions">
                            <button class="accept-btn" onclick="acceptRequest('${req.fromId}')">Accept</button>
                            <button class="decline-btn" onclick="declineRequest('${req.fromId}')">Decline</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) { console.error('Failed to load requests:', error); }
        }

        async function acceptRequest(friendId) {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/accept`, {
                    method: 'POST',
                    body: JSON.stringify({ friendId })
                });
                if (response.ok) {
                    showToast('Friend request accepted!', 'success');
                    await loadFriends();
                    await loadPendingRequests();
                    if (socket) {
                        socket.emit('friend-request-accepted', { friendId });
                    }
                    setTimeout(() => {
                        location.reload();
                    }, 500);
                }
            } catch (error) {
                showToast('Failed to accept request', 'error');
            }
        }

        async function declineRequest(friendId) {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/decline`, {
                    method: 'POST',
                    body: JSON.stringify({ friendId })
                });
                if (response.ok) {
                    showToast('Friend request declined', 'info');
                    await loadPendingRequests();
                }
            } catch (error) {
                showToast('Failed to decline request', 'error');
            }
        }

        async function loadFriends() {
            try {
                const response = await fetchWithAuth(`${API_URL}/api/friends/list`);
                const friends = await response.json();
                const friendsList = document.getElementById('friendsList');
                if (friends.length === 0) {
                    friendsList.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">No friends yet<br>Add friends to start chatting!</div>';
                    return;
                }
                friendsList.innerHTML = friends.map(friend => `
                    <div class="friend-item">
                        <div class="friend-avatar">${friend.username.charAt(0).toUpperCase()}</div>
                        <div class="friend-info" onclick="selectFriend('${friend.id}', '${escapeHtml(friend.username)}')">
                            <div class="friend-name">${escapeHtml(friend.username)}</div>
                            <div class="friend-status ${friend.online ? 'online' : ''}">${friend.online ? 'Online' : 'Offline'}</div>
                        </div>
                        <button class="call-btn" onclick="startVideoCall('${friend.id}', '${escapeHtml(friend.username)}')">📞 Video Call</button>
                    </div>
                `).join('');
            } catch (error) { console.error('Failed to load friends:', error); }
        }

        function toggleSearch() {
            const searchSection = document.getElementById('searchSection');
            searchSection.style.display = searchSection.style.display === 'none' ? 'block' : 'none';
            if (searchSection.style.display === 'block') {
                document.getElementById('searchInput').focus();
            }
        }

        async function selectFriend(friendId, friendName) {
            currentChatFriend = { id: friendId, username: friendName };
            document.getElementById('chatWith').textContent = `Chat with ${friendName}`;
            document.getElementById('typingStatus').textContent = '';
            await loadMessages();
            loadFriends();
            document.getElementById('messageInput').focus();
        }

        async function loadMessages() {
            if (!currentChatFriend) return;
            try {
                const response = await fetchWithAuth(`${API_URL}/api/messages/${currentChatFriend.id}`);
                const messages = await response.json();
                const container = document.getElementById('messagesContainer');
                if (messages.length === 0) {
                    container.innerHTML = '<div class="empty-chat">No messages yet<br>Send a message to start the conversation!</div>';
                    return;
                }
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.senderId === currentUser.id ? 'sent' : 'received'}">
                        <div class="message-bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            } catch (error) { console.error('Failed to load messages:', error); }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatFriend || !socket) {
                if (!currentChatFriend) showToast('Select a friend first', 'warning');
                return;
            }
            
            if (containsEmoji(text)) {
                showToast('Emojis are not allowed in messages', 'error');
                return;
            }
            
            socket.emit('send-message', { receiverId: currentChatFriend.id, text: text, tempId: Date.now().toString() });
            input.value = '';
            input.style.height = 'auto';
            clearTimeout(typingTimeout);
            if (typingTimeout) socket.emit('typing', { receiverId: currentChatFriend.id, isTyping: false });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('messageInput')?.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        async function showApp() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('appContainer').classList.add('visible');
            document.getElementById('currentUsername').textContent = currentUser.username;
            document.getElementById('userAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
            await loadFriends();
            await loadPendingRequests();
            initSocket();
            initPeer();
        }

        const savedAccessToken = localStorage.getItem('accessToken');
        if (savedAccessToken) {
            accessToken = savedAccessToken;
            refreshToken = localStorage.getItem('refreshToken');
            fetchWithAuth(`${API_URL}/api/friends/list`).then(async (response) => {
                if (response.ok) {
                    const userResponse = await fetchWithAuth(`${API_URL}/api/user`).catch(() => null);
                    if (userResponse && userResponse.ok) {
                        const userData = await userResponse.json();
                        currentUser = userData;
                        showApp();
                    } else {
                        localStorage.removeItem('accessToken');
                        localStorage.removeItem('refreshToken');
                        showLogin();
                    }
                } else {
                    localStorage.removeItem('accessToken');
                    localStorage.removeItem('refreshToken');
                    showLogin();
                }
            }).catch(() => {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('refreshToken');
                showLogin();
            });
        } else {
            showLogin();
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideUp {
                from { opacity: 0; transform: translateX(-50%) translateY(20px); }
                to { opacity: 1; transform: translateX(-50%) translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
