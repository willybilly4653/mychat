<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub - Real-time Messenger</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-darker: #0f0f1a;
            --primary: #0f3460;
            --accent: #e94560;
            --text: #eee;
            --text-dim: #888;
            --border: #2a2a3e;
            --success: #10b981;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Auth styles */
        .auth-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            transition: transform 0.3s ease;
        }

        .auth-container.hidden {
            transform: translateY(-100%);
            pointer-events: none;
        }

        .auth-box {
            background: rgba(22, 30, 46, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #c73e56);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            margin-top: 10px;
        }

        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .toggle-auth a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        /* Main app */
        .app-container {
            display: none;
            height: 100vh;
        }

        .app-container.visible {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: rgba(15, 15, 26, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .username {
            font-weight: 600;
        }

        .status {
            font-size: 12px;
            color: var(--success);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        .friends-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .add-friend-btn {
            background: linear-gradient(135deg, var(--primary), var(--bg-dark));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            color: var(--text);
            cursor: pointer;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            margin-bottom: 10px;
        }

        .search-results {
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
        }

        .search-result-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .friend-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .friend-item.active {
            background: rgba(233, 69, 96, 0.2);
        }

        .friend-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-size: 14px;
            font-weight: 500;
        }

        .friend-status {
            font-size: 11px;
            color: var(--text-dim);
        }

        .friend-status.online {
            color: var(--success);
        }

        .typing-indicator {
            font-size: 11px;
            color: var(--accent);
            font-style: italic;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .chat-with {
            font-size: 18px;
            font-weight: 600;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, var(--accent), #c73e56);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            padding: 0 8px;
        }

        .message-input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text);
            font-size: 14px;
            resize: none;
            font-family: inherit;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #c73e56);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            text-align: center;
            padding: 40px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--primary-light);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .user-details, .friend-info .friend-status, .friend-name {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">Create Account</h2>
            <div id="loginForm" style="display: none;">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <div class="error-msg" id="loginError"></div>
                <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                <div class="toggle-auth">Don't have an account? <a onclick="showRegister()">Sign up</a></div>
            </div>
            <div id="registerForm">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Password (min 8 characters)">
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" placeholder="Confirm Password">
                </div>
                <div class="error-msg" id="regError"></div>
                <button class="btn btn-primary" onclick="handleRegister()">Create Account</button>
                <div class="toggle-auth">Already have an account? <a onclick="showLogin()">Login</a></div>
            </div>
        </div>
    </div>

    <div id="appContainer" class="app-container">
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-details">
                    <div class="username" id="currentUsername">User</div>
                    <div class="status" id="onlineStatus">● Online</div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪</button>
            </div>
            <div class="friends-section">
                <button class="add-friend-btn" onclick="toggleSearch()">+ Add Friend</button>
                <div id="searchSection" style="display: none;">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search users..." oninput="searchUsers()">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="section-title">FRIENDS</div>
                <div class="friends-list" id="friendsList"></div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-with" id="chatWith">Select a friend to start chatting</div>
                <div id="typingStatus" style="font-size: 12px; color: #e94560; margin-top: 5px;"></div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-chat">👋 Click on a friend to start messaging</div>
            </div>
            <div class="message-input-area">
                <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1" onkeypress="handleKeyPress(event)" oninput="handleTyping()"></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
